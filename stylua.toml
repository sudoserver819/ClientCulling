# Stylua Configuration: https://github.com/JohnnyMorganz/StyLua

syntax = "Luau"
column_width = 120
line_endings = "Unix"
indent_type = "Tabs"
indent_width = 4
quote_style = "ForceDouble"
call_parentheses = "Input"
collapse_simple_statement = "Never"
space_after_function_names = "Never"

[sort_requires]
enabled = true
